spring:
  application:
    name: sd-channel-activity-history

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true   # /actuator/health/liveness + /readiness for K8s probes
  info:
    env:
      enabled: true

info:
  bian:
    serviceDomain: "Channel Activity History"
    businessArea: "Sales and Service"
    businessDomain: "Channels"
    functionalPattern: "Maintain"
    assetType: "Channel Activity Log"
    controlRecord: "Channel Activity Log Maintenance Agreement"

resilience4j:
  circuitbreaker:
    instances:
      serviceDomain:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
